<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CincoScribe — Audio Transcription &amp; Generation</title>
  <meta name="description"
    content="Transcribe any audio in 99 languages with precise timestamps. Generate voice, merge audio, and create AI prompts. Fast, accurate, and private.">

  <!-- Preconnect for Google Fonts -->

<body>
  <!-- ═══════════════ Startup Loading Screen Overlay ═══════════════ -->
  <div id="splash-screen" style="position: fixed; inset: 0; z-index: 999999; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 400ms ease, visibility 400ms ease;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 24px; max-width: 340px; width: 85%; text-align: center;">
      <!-- Logo layout matching Image 2 (Icon + CincoScribe matching dashboard logo) -->
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 10px 24px rgba(0,0,0,0.5); overflow: hidden;">
          <img src="cincoscribe.png" alt="CincoScribe" style="width: 100%; height: 100%; object-fit: contain; border-radius: 12px;">
        </div>
        <span style="font-family: var(--ff-mono, monospace); font-size: 25px; letter-spacing: -0.02em; white-space: nowrap; line-height: 1;">
          <span style="color: #a0a0a0; font-weight: 500;">Cinco</span><span style="color: #ffffff; font-weight: 800;">Scribe</span>
        </span>
      </div>

      <div style="width: 100%;">
        <p id="splash-status" style="font-size: 12px; color: #888; margin: 0 0 12px 0; font-family: var(--ff-sans); line-height: 1.4;">Connecting to local backend...</p>
        <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; position: relative;">
          <div id="splash-progress" style="height: 100%; width: 10%; background: linear-gradient(90deg, #d97706, #f59e0b); border-radius: 2px; transition: width 200ms ease-out;"></div>
        </div>
      </div>
    </div>
  </div>

        </nav>

        <!-- User / Settings — at bottom of rail -->
        <!-- Settings — at bottom of rail -->

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"

              <path

    <!-- Hidden JS anchors — sidebar.js references these IDs; kept hidden so it doesn't throw errors -->
    <button id="btn-expand-desktop" style="display:none;" aria-hidden="true"></button>

    <!-- ═══════════════ Main Content Column ═══════════════ -->

      <!-- Topbar — sticky 52px strip -->

        <p class="topbar-title" id="topbar-page-title">

        <div class="topbar-actions">
          <!-- Theme toggle -->

            <svg id="icon-sun" class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"

  <script src="js/whisper.js?v=7"></script>

  <script src="js/router.js?v=7"></script>
  <script src="js/sidebar.js?v=7"></script>
  <script src="js/pages/settings-modal.js?v=8"></script>
  <script src="js/pages/transcribe.js?v=7"></script>
  <script src="js/pages/text-to-voice.js?v=7"></script>

  <script src="js/pages/merge-audio.js?v=8"></script>
  <script src="js/pages/history.js?v=9"></script>
  <script src="js/pages/models.js?v=8"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ── Ask for Internet Access (Once at startup) ───────
      if (localStorage.getItem('internetAccessAllowed') === null) {
        const allowed = confirm("Do you allow CincoScribe to access the internet to download models and check for updates?");
        localStorage.setItem('internetAccessAllowed', allowed ? 'true' : 'false');
        AppState.internetAccessAllowed = allowed;
        AppState.save();
      } else {
        AppState.internetAccessAllowed = localStorage.getItem('internetAccessAllowed') === 'true';
      }
      // ── First Time Launch Changelog Modal ────────────────
      function showFirstTimeChangelogModal() {
        const modal = document.createElement('div');
        modal.id = 'first-time-changelog-modal';
        modal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: rgba(0, 0, 0, 0.85);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 99999;
          backdrop-filter: blur(4px);
        `;
        
        modal.innerHTML = `
          <div style="background: var(--clr-bg-subtle, #1d1d1d); border: 1px solid var(--clr-border, #333); border-radius: var(--radius-xl, 16px); width: 90%; max-width: 650px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); color: var(--clr-text); font-family: var(--ff-sans);">
            <!-- Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--clr-border);">
              <div>
                <h3 style="margin: 0; font-size: 15px; font-weight: 700; font-family: var(--ff-display); color: var(--clr-text);">Developer Notes & Changelog</h3>
                <span style="font-size: 10px; color: #ef4444; font-weight: bold; text-transform: uppercase; margin-top: 2px; display: inline-block;">⚠️ Status: Still NOT an MVP yet</span>
              </div>
              <button id="btn-close-changelog-x" style="background: none; border: none; color: var(--clr-text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 14px;">✕</button>
            </div>
            <!-- Body -->
            <div style="padding: 20px; max-height: 400px; overflow-y: auto; background: var(--clr-bg-code, #101010); margin: 16px 20px; border-radius: var(--radius-lg, 8px); border: 1px solid rgba(255,255,255,0.05); font-family: var(--ff-mono); font-size: 12px; line-height: 1.6; color: #a3a3a3;">
              
              <div style="margin-bottom: 18px;">
                <h4 style="color: #10b981; margin: 0 0 8px 0; font-size: 13px; font-weight: 600;">✓ WORKING FEATURES</h4>
                <ul style="margin: 0; padding-left: 20px; list-style-type: square;">
                  <li><strong>Theme Changer:</strong> Works seamlessly between dark/light appearance.</li>
                  <li><strong>Merge Audio:</strong> Multi-track audio concatenation is fully working.</li>
                  <li><strong>Transcriber:</strong> Local browser and API-based scribing works.</li>
                </ul>
              </div>

              <div style="margin-bottom: 18px;">
                <h4 style="color: var(--clr-primary, #d4a359); margin: 0 0 8px 0; font-size: 13px; font-weight: 600;">✓ RECENT CHANGES (v1.0.0)</h4>
                <ul style="margin: 0; padding-left: 20px; list-style-type: square;">
                  <li><strong>Default Port Migration:</strong> Python backend default port changed from 3901 to 5555.</li>
                  <li><strong>Models Page Redesign:</strong> Model folder settings and migration SSE stream moved to the Models tab.</li>
                  <li><strong>Model Deletion Security:</strong> Added "UNREVERSIBLE" confirmation prompt to model removals.</li>
                  <li><strong>Audio Merger Fix:</strong> Resolved missing fileToBase64 JS crash.</li>
                  <li><strong>Settings Styling Restored:</strong> Fixed settings layout spacing/borders.</li>
                  <li><strong>History Deletion Fix:</strong> Added missing AppState.deleteHistory method.</li>
                </ul>
              </div>

              <div style="margin-bottom: 18px;">
                <h4 style="color: #ef4444; margin: 0 0 8px 0; font-size: 13px; font-weight: 600;">⚠️ KNOWN ERRORS & BUGS</h4>
                <ul style="margin: 0; padding-left: 20px; list-style-type: square;">
                  <li><strong>Executable Build Failure:</strong> Running 'npm run build' and opening the generated desktop executable fails with a Javascript error on startup.</li>
                  <li><strong>Folder Change Bug:</strong> Changing the models directory doesn't work properly yet.</li>
                  <li><strong>Model Download & Routing Issues:</strong> Model downloads can fail and routing problems still exist.</li>
                  <li><strong>Firefox CORS (null) Error:</strong> Connection refused if python server is not restarted on port 5555.</li>
                  <li><strong>Browser WASM download flicker:</strong> Rapid progress bar updates from transformers.js might shift layout elements.</li>
                </ul>
              </div>

              <div>
                <h4 style="color: #3b82f6; margin: 0 0 8px 0; font-size: 13px; font-weight: 600;">⚒️ WORKING AREA & NEXT STEPS</h4>
                <ul style="margin: 0; padding-left: 20px; list-style-type: square;">
                  <li><strong>Text to Speech:</strong> Needs to be worked on (currently incomplete).</li>
                  <li>Validate system compatibility for PyTorch/CUDA prior to downloading larger models.</li>
                  <li>Refactor local browser transcription to support streamed chunk buffers.</li>
                  <li>Add automatic host port scanning and fallback options.</li>
                </ul>
              </div>
            </div>
            <!-- Footer -->
            <div style="display: flex; justify-content: flex-end; padding: 12px 20px; border-top: 1px solid var(--clr-border); gap: 12px;">
              <button id="btn-close-changelog" style="background: var(--clr-primary, #d4a359); color: black; font-weight: bold; border-radius: var(--radius-full, 9999px); padding: 8px 20px; font-size: 12px; border: none; cursor: pointer;">Acknowledge & Dismiss</button>
            </div>
          </div>
        `;

        document.body.appendChild(modal);

        const dismiss = () => {
          localStorage.setItem('firstTimeChangelogSeen_v1.0.0', 'true');
          modal.remove();
        };

        document.getElementById('btn-close-changelog-x').addEventListener('click', dismiss);
        document.getElementById('btn-close-changelog').addEventListener('click', dismiss);
      }

      if (localStorage.getItem('firstTimeChangelogSeen_v1.0.0') === null) {
        showFirstTimeChangelogModal();
      }
      // ── Topbar page title sync ───────────────────────────
      const pageNames = {
        'dashboard/transcribe': 'Transcribe',
        'dashboard/text-to-voice': 'Text to Speech',
        'dashboard/merge-audio': 'Merge Audio',
        'dashboard/history': 'History',
        'dashboard/settings': 'Settings',
        'dashboard/upgrade': 'Upgrade Plan'
      };

      window.updateTopbarTitle = function (route) {
        const el = document.getElementById('topbar-page-title');
        if (el) {
          el.innerHTML = `<span class="topbar-title-primary">${pageNames[route] || 'CincoScribe'}</span>`;
        }
        // Sync bottom tab bar active state
        document.querySelectorAll('.tab-item').forEach(tab => {
          tab.classList.toggle('active', tab.getAttribute('data-nav') === route);
        });
      };

      Sidebar.init();
      Router.init();

      // ── Startup Splash & Backend Health Check ──────────
      (function checkStartupBackend() {
        const splash = document.getElementById('splash-screen');
        const progressBar = document.getElementById('splash-progress');
        const statusText = document.getElementById('splash-status');

        if (!splash || !progressBar) return;

        const TOTAL_LOADING_TIME = 9000; // 9 seconds duration
        const startTime = Date.now();

        // Perform backend health check in background
        async function pingBackend() {
          try {
            let port = 5555;
            if (window.electronAPI && window.electronAPI.getSidecarPort) {
              port = await window.electronAPI.getSidecarPort();
            }
            let token = '';
            if (window.electronAPI && window.electronAPI.getSidecarToken) {
              try { token = await window.electronAPI.getSidecarToken(); } catch (e) {}
            }
            const headers = token ? { 'X-Sidecar-Token': token } : {};
            const hostname = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '127.0.0.1' : (window.location.hostname || 'localhost');
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1000);
            await fetch(`http://${hostname}:${port}/health`, { headers, signal: controller.signal });
            clearTimeout(timeoutId);
          } catch (e) {}
        }

        pingBackend();
        const healthInterval = setInterval(pingBackend, 1500);

        const progressInterval = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const pct = Math.min(100, Math.floor((elapsed / TOTAL_LOADING_TIME) * 100));
          progressBar.style.width = pct + '%';

          if (pct < 35) {
            if (statusText) statusText.textContent = 'Connecting to local backend...';
          } else if (pct < 70) {
            if (statusText) statusText.textContent = 'Initializing Whisper & TTS engines...';
          } else if (pct < 95) {
            if (statusText) statusText.textContent = 'Loading interface components...';
          } else {
            if (statusText) statusText.textContent = 'Backend ready';
          }

          if (elapsed >= TOTAL_LOADING_TIME) {
            clearInterval(progressInterval);
            clearInterval(healthInterval);
            progressBar.style.width = '100%';
            if (statusText) statusText.textContent = 'Backend ready';
            setTimeout(() => {
              splash.style.opacity = '0';
              splash.style.visibility = 'hidden';
              setTimeout(() => { splash.style.display = 'none'; }, 400);
            }, 300);
          }
        }, 50);
      })();

      // ── Theme toggle ────────────────────────────────────
      const themeToggle = document.getElementById('btn-theme-toggle');
      const iconSun = document.getElementById('icon-sun');
      const iconMoon = document.getElementById('icon-moon');

      function updateThemeIcons() {
        if (!iconSun || !iconMoon) return;
        const isDark = AppState.theme === 'dark';
        iconSun.style.display = isDark ? 'block' : 'none';
        iconMoon.style.display = isDark ? 'none' : 'block';
      }

      if (themeToggle) {
        updateThemeIcons();
        themeToggle.addEventListener('click', () => {
          AppState.theme = AppState.theme === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', AppState.theme);
          updateThemeIcons();
          AppState.save();
        });
      }

      // Wire bottom tab bar nav clicks through Router
      document.querySelectorAll('.tab-item[data-nav]').forEach(tab => {
        tab.addEventListener('click', (e) => {
          e.preventDefault();
          Router.navigate(tab.getAttribute('data-nav'));
        });
      });

      // Global Key Bindings (Ctrl+Shift+S)
      document.addEventListener('keydown', (e) => {
        // Ctrl+Shift+S -> Navigate to settings (ensure they are logged in)
        if (AppState.isLoggedIn && e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          Router.navigate('dashboard/settings');
        }
      });
    });
  </script>
</body>
