<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Activate CincoScribe</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      width: 100%;
      max-width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      font-family: monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-sizing: border-box;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled {
      background: #444;
    }
    #error {
      color: #ff4444;
      margin-top: 10px;
      font-size: 14px;
    }
    .spinner {
      display: none;
      margin: 10px auto;
      border: 4px solid rgba(255,255,255,0.1);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border-left-color: #007bff;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h2>Activate</h2>
    <p>Enter your 16-character key.</p>
    <input type="text" id="keyInput" maxlength="19" placeholder="XXXX-XXXX-XXXX-XXXX">
    <button id="activateBtn">Activate</button>
    <div class="spinner" id="spinner"></div>
    <div id="error"></div>
  </div>

  <script>
    const input = document.getElementById('keyInput');
    const btn = document.getElementById('activateBtn');
    const error = document.getElementById('error');
    const spinner = document.getElementById('spinner');

    input.addEventListener('input', (e) => {
      let val = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
      let formatted = val.match(/.{1,4}/g)?.join('-') || '';
      e.target.value = formatted;
    });

    btn.addEventListener('click', async () => {
      const key = input.value.replace(/-/g, '');
      if (key.length !== 16) {
        error.textContent = 'Key must be exactly 16 characters.';
        return;
      }

      error.textContent = '';
      btn.disabled = true;
      spinner.style.display = 'block';

      try {
        const fingerprint = await window.electronAPI.getFingerprint();
        const res = await window.electronAPI.validate(key);
        
        if (res.valid) {
          window.electronAPI.storeActivation(key, fingerprint);
          window.electronAPI.activationComplete();
        } else {
          error.textContent = `Activation failed: ${res.reason}`;
        }
      } catch (err) {
        error.textContent = 'Error connecting to activation server.';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
